<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Rich Indigo-Purple Brand Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="50%" stop-color="#3b0764" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    
    <!-- Pure white to light gray gradient for realistic 3D sheen on symbol -->
    <linearGradient id="symbolGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="60%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </linearGradient>

    <!-- Subtle Glow filter for educational sparks -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Rounded App Icon Background -->
  <rect width="512" height="512" rx="115" fill="url(#bgGrad)" />

  <g fill="url(#symbolGrad)">
    <!-- 4-Point Magic Star (Top-Left) -->
    <path d="M 215 150 C 215 162, 208 170, 195 170 C 208 170, 215 178, 215 190 C 215 178, 222 170, 235 170 C 222 170, 215 162, 215 150 Z" filter="url(#glow)" />
    <!-- Secondary small sparkle -->
    <circle cx="230" cy="205" r="4.5" fill="#ffffff" opacity="0.8" />
    
    <!-- Stylized Graduation Cap (Rhombus Top) -->
    <path d="M 256 160 L 385 210 L 256 260 L 127 210 Z" />

    <!-- Under-Cap Neck/Shadow -->
    <path d="M 195 235 L 256 260 L 317 235 L 317 255 L 256 280 L 195 255 Z" opacity="0.15" fill="#000000" />

    <!-- Tassel hanging from right side -->
    <!-- Cap Corner at (385, 210) -->
    <path d="M 370 215 L 370 268 C 370 274, 373 282, 370 290" stroke="#f1f5f9" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.9" />
    <path d="M 366 290 L 374 290 L 371 315 L 369 315 Z" />

    <!-- Open Book Base -->
    <!-- Left Page -->
    <path d="M 195 245 L 256 270 L 256 322 C 240 316, 210 316, 195 326 Z" />
    <!-- Right Page -->
    <path d="M 256 270 L 317 245 L 317 326 C 302 316, 272 316, 256 322 Z" />
    <!-- Book Thickness pages -->
    <path d="M 195 330 C 210 320, 240 320, 256 325 C 272 320, 302 320, 317 330 L 317 336 C 302 326, 272 326, 256 331 C 240 326, 210 326, 195 336 Z" />

    <!-- Swooping Dynamic Arrow (representing online growth and guidance) -->
    <!-- Curves from bottom-left around and points up through the book -->
    <path d="M 180 270 C 180 305, 215 320, 256 308 C 278 300, 292 280, 298 258 L 304 260 C 298 285, 280 307, 256 316 C 210 332, 172 315, 172 270 C 172 245, 190 225, 206 215 L 210 220 C 195 230, 180 248, 180 270 Z" fill="#ffffff" />
    <!-- Arrow Head pointing up-right -->
    <path d="M 302 246 L 310 262 L 292 258 Z" fill="#ffffff" filter="url(#glow)" />
  </g>
</svg>
